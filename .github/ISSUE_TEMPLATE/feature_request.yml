name: Feature request
description: Suggest an improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Note: a deferred backlog (exam/applied modes, URL & long-document ingestion, MCP server,
        personalized FSRS weights) is **intentionally frozen** until the core loop is proven sticky
        for a real user — see CONTRIBUTING.md. Requests in that area are welcome but will be queued.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The learner/maintainer pain, not just the feature.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: How might it work? Does it fit the invariants (stdlib core, markdown-as-truth, teach-first)?
    validations:
      required: false

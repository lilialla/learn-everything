name: Feature request
description: Suggest an improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Note: optional adapters and modes are welcome, but they must stay out-of-core, lazy-dependency,
        privacy-preserving, and subordinate to the core teaching/review loop — see CONTRIBUTING.md.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The learner/maintainer pain, not just the feature.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed approach
      description: How might it work? Does it fit the invariants (stdlib core, markdown-as-truth, teach-first)?
    validations:
      required: false
